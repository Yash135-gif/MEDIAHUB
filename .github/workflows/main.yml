name: Runner Deep Practice

on:
  workflow_dispatch:

jobs:

  explore-runner:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Basic Runner Information
        run: |
          echo "Current User:"
          whoami

          echo "Current Directory:"
          pwd

          echo "Operating System:"
          uname -a

      - name: Check CPU and RAM
        run: |
          echo "CPU Cores:"
          nproc

          echo "RAM Information:"
          free -h

      - name: Check Installed Tools
        run: |
          echo "Git Version:"
          git --version

          echo "Node Version:"
          node --version

          echo "NPM Version:"
          npm --version

          echo "Docker Version:"
          docker --version

      - name: Show Files
        run: ls -la

  parallel-job-1:
    runs-on: ubuntu-latest

    steps:
      - name: Start Job 1
        run: |
          echo "Job 1 Started"
          sleep 10
          echo "Job 1 Finished"

  parallel-job-2:
    runs-on: ubuntu-latest

    steps:
      - name: Start Job 2
        run: |
          echo "Job 2 Started"
          sleep 5
          echo "Job 2 Finished"