name: Job Dependencies Practice

on:
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Tests
        run: |
          echo "Running tests..."
          sleep 5
          echo "Tests Passed"

  build:
    needs: test

    runs-on: ubuntu-latest

    steps:
      - name: Build Docker Image
        run: |
          echo "Building Docker Image..."
          sleep 5
          echo "Build Completed"

  deploy:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application
        run: |
          echo "Deploying Application..."
          sleep 5
          echo "Deployment Successful"